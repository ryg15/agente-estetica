<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glam Studio — Asistente IA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow-x: hidden; }
    body { font-family: -apple-system, sans-serif; background: #FDF6F9; display: flex; flex-direction: column; height: 100dvh; }
    .header { background: white; padding: 14px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #F0D9E5; box-shadow: 0 1px 4px rgba(0,0,0,0.06); flex-shrink: 0; }
    .logo { width: 40px; height: 40px; border-radius: 50%; background: #F4C0D1; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .header-text h1 { font-size: 16px; font-weight: 600; color: #2D1B25; }
    .header-text p { font-size: 12px; color: #9B7A87; }
    .status { width: 8px; height: 8px; border-radius: 50%; background: #1D9E75; margin-left: auto; flex-shrink: 0; }
    .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { display: flex; gap: 8px; align-items: flex-end; }
    .msg.user { flex-direction: row-reverse; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
    .bubble { max-width: 78%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.55; white-space: pre-wrap; }
    .msg.agent .bubble { background: white; border: 1px solid #F0D9E5; border-bottom-left-radius: 4px; color: #2D1B25; }
    .msg.user .bubble { background: #D4537E; border-bottom-right-radius: 4px; color: white; }
    .time { font-size: 10px; color: #B09AA5; margin-top: 4px; }
    .typing { display: flex; gap: 4px; padding: 12px 14px; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: #D4537E; animation: bounce 1s infinite; }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
    .footer { background: white; padding: 12px 16px; border-top: 1px solid #F0D9E5; flex-shrink: 0; }
    .quick { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .qbtn { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid #F0D9E5; background: white; color: #9B7A87; cursor: pointer; white-space: nowrap; }
    .qbtn:hover { background: #FDF6F9; border-color: #D4537E; color: #D4537E; }
    .input-row { display: flex; gap: 8px; align-items: center; }
    .input-row input { flex: 1; min-width: 0; padding: 10px 14px; border: 1px solid #F0D9E5; border-radius: 24px; font-size: 16px; outline: none; background: #FDF6F9; }
    .input-row input:focus { border-color: #D4537E; background: white; }
    .send { width: 40px; height: 40px; min-width: 40px; border-radius: 50%; background: #D4537E; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; flex-shrink: 0; }
    .send:hover { background: #B03560; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">✨</div>
  <div class="header-text">
    <h1>Glam Studio</h1>
    <p>Valentina · siempre disponible</p>
  </div>
  <div class="status"></div>
</div>

<div class="chat" id="chat"></div>

<div class="footer">
  <div class="quick">
    <button class="qbtn" onclick="quick('Quiero sacar un turno')">📅 Sacar turno</button>
    <button class="qbtn" onclick="quick('¿Qué tratamientos tienen?')">💆 Tratamientos</button>
    <button class="qbtn" onclick="quick('¿Cuáles son los precios?')">💰 Precios</button>
    <button class="qbtn" onclick="quick('Quiero recibir promociones')">🌸 Promociones</button>
  </div>
  <div class="input-row">
    <input type="text" id="inp" placeholder="Escribí tu mensaje..." onkeydown="if(event.key==='Enter') send()">
    <button class="send" onclick="send()">➤</button>
  </div>
</div>

<script>
  let history = [];

  function time() {
    return new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
  }

  function addMsg(role, text) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    const isAgent = role === 'agent';
    div.innerHTML = `
      <div class="avatar" style="background:${isAgent ? '#F4C0D1' : '#D4537E'};color:${isAgent ? '#72243E' : 'white'}">
        ${isAgent ? '✨' : '👤'}
      </div>
      <div>
        <div class="bubble">${text}</div>
        <div class="time" style="text-align:${isAgent ? 'left' : 'right'}">${time()}</div>
      </div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg agent'; div.id = 'typing';
    div.innerHTML = `<div class="avatar" style="background:#F4C0D1;color:#72243E">✨</div>
      <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function send() {
    const inp = document.getElementById('inp');
    const text = inp.value.trim();
    if (!text) return;
    inp.value = '';
    addMsg('user', text);
    history.push({ role: 'user', content: text });
    showTyping();
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      hideTyping();
      const reply = data.content?.[0]?.text || 'Error al responder.';
      history.push({ role: 'assistant', content: reply });
      addMsg('agent', reply);
    } catch(e) {
      hideTyping();
      addMsg('agent', 'Error de conexión. Intentá de nuevo.');
    }
  }

  function quick(msg) {
    document.getElementById('inp').value = msg;
    send();
  }

  addMsg('agent', '¡Hola! Soy Valentina de Glam Studio ✨ ¿En qué te puedo ayudar hoy?');
</script>
</body>
</html>
